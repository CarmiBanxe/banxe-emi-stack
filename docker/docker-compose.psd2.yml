version: "3.9"
# P0 PSD2 Stack — FA-07 mock-ASPSP (FastAPI sandbox)
# FCA CASS 7.15 | banxe-emi-stack | IL-011
#
# Replaces adorsys open-banking-gateway (private registry, unavailable)
# with a lightweight FastAPI mock that generates CAMT.053 XML.
#
# Ports:
#   :8888 → mock-aspsp (PSD2 AIS API + CAMT.053 generator)
#
# Usage:
#   docker compose -f docker/docker-compose.psd2.yml up -d --build
#   curl http://localhost:8888/actuator/health

services:
  mock-aspsp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mock-aspsp
    image: banxe-mock-aspsp:latest
    container_name: banxe-mock-aspsp
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      # Sandbox placeholder IBANs — DO NOT set real IBANs until
      # logging / env-exposure / network-isolation validation complete
      SAFEGUARDING_OPERATIONAL_IBAN:   ${SAFEGUARDING_OPERATIONAL_IBAN:-GB29BARC20201530093459}
      SAFEGUARDING_CLIENT_FUNDS_IBAN:  ${SAFEGUARDING_CLIENT_FUNDS_IBAN:-GB94BARC20201530093460}
      SAFEGUARDING_OPERATIONAL_ACCOUNT: ${SAFEGUARDING_OPERATIONAL_ACCOUNT:-019d6332-f274-709a-b3a7-983bc8745886}
      SAFEGUARDING_CLIENT_FUNDS_ACCOUNT: ${SAFEGUARDING_CLIENT_FUNDS_ACCOUNT:-019d6332-da7f-752f-b9fd-fa1c6fc777ec}
      # Mock balances for sandbox testing
      MOCK_OPERATIONAL_BALANCE:  ${MOCK_OPERATIONAL_BALANCE:-125000.00}
      MOCK_CLIENT_FUNDS_BALANCE: ${MOCK_CLIENT_FUNDS_BALANCE:-480000.00}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8888/actuator/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
