# docker-compose.compliance-memory.yml
# BANXE AI Bank — Compliance Memory Stack (SANDBOX)
# LEGION ONLY | NOT FOR PRODUCTION
# Usage: docker compose -f infra/docker/docker-compose.compliance-memory.yml \
#          --env-file infra/docker/.env.compliance-memory up -d

version: "3.9"

networks:
  compliance-net:
    driver: bridge
    name: compliance-memory-net

volumes:
  neo4j-compliance-data:
    name: banxe-neo4j-compliance-data
  neo4j-compliance-logs:
    name: banxe-neo4j-compliance-logs
  redis-compliance-data:
    name: banxe-redis-compliance-data

services:

  # ──────────────────────────────────────────────
  # Neo4j — Graphiti graph backend
  # ──────────────────────────────────────────────
  neo4j-compliance:
    image: neo4j:5.18-community
    container_name: neo4j-compliance
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/CHANGEME_IN_DOT_ENV}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "512m"
      NEO4J_dbms_default__database: "banxe-compliance-sandbox"
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j-compliance-data:/data
      - neo4j-compliance-logs:/logs
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    labels:
      banxe.service: "neo4j-compliance"
      banxe.env: "sandbox"
      banxe.owner: "compliance-memory"

  # ──────────────────────────────────────────────
  # Redis — Graphiti cache (isolated namespace)
  # Port 6380 to avoid conflict with main Redis :6379
  # ──────────────────────────────────────────────
  redis-compliance:
    image: redis:7-alpine
    container_name: redis-compliance
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6380:6379"
    volumes:
      - redis-compliance-data:/data
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      banxe.service: "redis-compliance"
      banxe.env: "sandbox"

  # ──────────────────────────────────────────────
  # Graphiti MCP Server — compliance memory API
  # Exposes: REST + MCP on :8765
  # ──────────────────────────────────────────────
  compliance-graphiti:
    image: python:3.12-slim
    container_name: compliance-graphiti
    restart: unless-stopped
    depends_on:
      neo4j-compliance:
        condition: service_healthy
      redis-compliance:
        condition: service_healthy
    environment:
      # Neo4j connection
      NEO4J_URI: "bolt://neo4j-compliance:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-CHANGEME_IN_DOT_ENV}"
      # LLM for entity extraction (OpenAI-compatible)
      GRAPHITI_LLM_API_KEY: "${GRAPHITI_LLM_API_KEY:-CHANGEME}"
      GRAPHITI_LLM_BASE_URL: "${GRAPHITI_LLM_BASE_URL:-https://api.openai.com/v1}"
      GRAPHITI_LLM_MODEL: "${GRAPHITI_LLM_MODEL:-gpt-4o-mini}"
      # Embedding model
      GRAPHITI_EMBEDDER_API_KEY: "${GRAPHITI_EMBEDDER_API_KEY:-${GRAPHITI_LLM_API_KEY}}"
      GRAPHITI_EMBEDDER_MODEL: "${GRAPHITI_EMBEDDER_MODEL:-text-embedding-3-small}"
      # Redis
      REDIS_URL: "redis://redis-compliance:6379/0"
      # Service config
      SERVICE_PORT: "8765"
      SANDBOX_MODE: "true"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "8765:8765"
    volumes:
      - ./../../infra/compliance-memory-service:/app:ro
    working_dir: /app
    command: >
      sh -c "pip install --quiet graphiti-core fastapi uvicorn httpx pyyaml &&
             python server.py"
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      banxe.service: "compliance-graphiti"
      banxe.env: "sandbox"

  # ──────────────────────────────────────────────
  # Seed Loader — loads compliance documents once
  # Exits after completion (restart: no)
  # ──────────────────────────────────────────────
  compliance-seed-loader:
    image: python:3.12-slim
    container_name: compliance-seed-loader
    restart: "no"
    depends_on:
      compliance-graphiti:
        condition: service_healthy
    environment:
      GRAPHITI_API_URL: "http://compliance-graphiti:8765"
      SEED_DIR: "/seed"
      SANDBOX_MODE: "true"
    volumes:
      - ./../../seed/compliance-memory:/seed:ro
      - ./../../infra/compliance-memory-service:/app:ro
    working_dir: /app
    command: >
      sh -c "pip install --quiet httpx pyyaml &&
             python load_seed.py"
    networks:
      - compliance-net
    labels:
      banxe.service: "compliance-seed-loader"
      banxe.env: "sandbox"
      banxe.role: "one-shot"
