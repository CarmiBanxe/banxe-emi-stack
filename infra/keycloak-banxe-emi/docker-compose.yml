# Keycloak realm banxe-emi — isolated compose stack
# ADR-017 / ADR-022 / I-34 / I-35 | FCA CASS 15
#
# GATE-A B (2026-05-04): KC_DB=dev-file (H2 file-backed in keycloak_data volume).
# Quarkus build-step (kc.sh build) systematically killed on evo1 when KC_DB=postgres
# is used — tracked as G-IAM-09 (target: 2026-05-31). No postgres sidecar needed.
# All secrets are operator-supplied env vars. See .env.example.
# Never commit real values. Pre-commit hook iam-no-direct-creds enforces this.

services:
  keycloak-banxe-emi:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: keycloak-banxe-emi
    command:
      - start
      - --hostname-strict=false
      - --http-enabled=true
      - --http-port=8180
      - --proxy-headers=xforwarded
      - --import-realm
    environment:
      KC_DB: dev-file
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOT_ADMIN:?KC_BOOT_ADMIN is required (operator-supplied env)}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOT_ADMIN_PASSWORD:?KC_BOOT_ADMIN_PASSWORD is required (operator-supplied env)}
      KC_HOSTNAME: ${KC_HOSTNAME:-evo1}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8180"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      JAVA_OPTS: "-Xms256m -Xmx1g -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m -XX:+UseG1GC -Dfile.encoding=UTF-8"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./realms:/opt/keycloak/data/import:ro
    ports:
      - "8180:8180"
    mem_limit: 2g
    memswap_limit: 4g
    healthcheck:
      test:
        - CMD-SHELL
        - >
          exec 3<>/dev/tcp/127.0.0.1/8180;
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3;
          cat <&3 | head -1 | grep -q 200
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s
    restart: unless-stopped

volumes:
  keycloak_data:
