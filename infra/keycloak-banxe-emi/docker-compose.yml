# Keycloak realm banxe-emi — isolated compose stack
# ADR-017 / ADR-022 / I-34 / I-35 | FCA CASS 15
#
# GATE-A B (2026-05-03): PID 5577 stopped; this compose is the primary KC on :8180.
# All secrets are operator-supplied env vars. See .env.example.
# Never commit real values. Pre-commit hook iam-no-direct-creds enforces this.
#
# OOM fix: KC JVM uses -XX:MaxRAMPercentage=70; without mem_limit it sees 30GB → 21GB heap.
# InitialRAMPercentage=50 tries to commit 15GB at build-step start → OOM kill (exit 137).
# mem_limit 2g: JVM sees 2GB → max heap 1.4GB, initial 1GB — safe for Quarkus build + runtime.

services:
  keycloak-banxe-emi:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: keycloak-banxe-emi
    command:
      - start
      - --hostname-strict=false
      - --http-enabled=true
      - --http-port=8180
      - --proxy-headers=xforwarded
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-pg:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD is required (operator-supplied env)}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOT_ADMIN:?KC_BOOT_ADMIN is required (operator-supplied env)}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOT_ADMIN_PASSWORD:?KC_BOOT_ADMIN_PASSWORD is required (operator-supplied env)}
      KC_HOSTNAME: ${KC_HOSTNAME:-evo1}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8180"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./realms:/opt/keycloak/data/import:ro
    ports:
      - "8180:8180"
    depends_on:
      keycloak-pg:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          exec 3<>/dev/tcp/127.0.0.1/8180;
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3;
          cat <&3 | head -1 | grep -q 200
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s
    mem_limit: 2g
    memswap_limit: 2g
    restart: unless-stopped

  keycloak-pg:
    image: postgres:16-alpine
    container_name: keycloak-banxe-emi-pg
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  keycloak_data:
  keycloak_pg_data:
