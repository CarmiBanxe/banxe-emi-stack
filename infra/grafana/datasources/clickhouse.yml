apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: banxe-clickhouse
    access: proxy
    url: http://clickhouse:8123
    jsonData:
      defaultDatabase: banxe
      username: ${CLICKHOUSE_USER:-default}
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD:-}
    isDefault: true
    editable: false
