# RED-agent budget policy — config-as-data (ADR-030 §9), operator-owned.
# Money is Decimal (quoted strings, never float). Over-budget ⇒ the agent refuses.
# Fail-closed: no config, or no entry for an agent ⇒ that agent is refused.
schema: agent-budget-policy/v1
