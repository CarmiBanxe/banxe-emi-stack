# banxe_config.yaml — Runtime product/fee/limit configuration
# Geniusto v5 Pattern #6 — Config-as-Data
# FCA: COBS 6 (fee disclosure), PSR 2017 Reg.67 (payment limits)
#
# Edit this file to change fees, limits, or add products.
# No code deploy needed — YAMLConfigStore.reload() picks it up at runtime.
#
# Fee types:
#   FLAT:       fee = flat_fee (percentage must be "0")
#   PERCENTAGE: fee = amount * percentage (flat_fee must be "0")
#   MIXED:      fee = flat_fee + amount * percentage
# All amounts in GBP (or native currency for FX products).

products:

  # ── EMI Account — retail customers (FCA-authorised EMI) ───────────────────
  EMI_ACCOUNT:
    display_name: "Banxe EMI Account"
