# Sprint 2 Watchdog MVP — node health + efficiency config
# I-27: auto actions = warm + log + alert ONLY. Never restart/reroute/evict.
# Topology measured 2026-07-07 (evo1/evo2/legion only; .71/.73 do not exist).

probe:
  p1_health_interval_s: 60
  p2_efficiency_interval_s: 900
  p1_timeout_s: 8
  gen_timeout_s: 120

thresholds:
  cold_strikes: 2
  escalate_after_warmup_fails: 3
  backoff_s: [10, 30, 120]
  escalation_cooldown_s: 1800
  min_tokens_per_sec:
    "llama3.3:70b": 5
    "qwen3.5:35b": 10
    default: 8
  max_hot_latency_s: 8
  max_cold_start_s: 90
  min_success_rate: 0.95
  correctness_probe:
    prompt: "What is 2+2? Reply only the number."
    expect_contains: "4"

nodes:
  - name: evo1
    url: http://192.168.0.72:11434
    warm_models:
      - "llama3.3:70b"
  - name: evo2
    url: http://192.168.0.15:11434
    warm_models:
      - "qwen3.5:35b"

autonomy:
  may_warm: true
  may_restart_ollama: true       # GUARDED: circuit-breaker required
  may_config_sync: true          # GUARDED: git pull --ff-only only
  may_recreate_stateless: true   # GUARDED: stateless containers only
  may_sync_ollama_ctx: false     # GUARDED: SSH-fix OLLAMA_NUM_CTX drift on remote nodes
  may_reroute: false
  may_evict: false

circuit_breaker:
  max_attempts: 3
  backoff_base_s: 10
  max_quarantine_s: 1800

escalation:
  ledger_path: /var/log/banxe/watchdog-ledger.jsonl
  webhook: null

docker:
  socket: /var/run/docker.sock
  auto_start_exited_clean: true
  crash_loop_threshold: 10
  monitor_containers:
    - litellm-postgres
    - intent-dispatcher

audit:
  enabled: false
  path: /var/log/banxe/watchdog-audit.jsonl

metrics:
  enabled: false
  port: 9091

dependency_graph:
  intent-dispatcher:
    depends_on:
      - litellm-postgres

snapshots:
  enabled: false
  dir: /var/lib/banxe-watchdog/snapshots

slo:
  model_downtime_threshold_s: 3600

config_drift:
  enabled: false
  interval_s: 3600
  baseline: services/watchdog/config-baseline.yaml
