name: Lint Frontend (Biome)
# IL-BIOME-01 | banxe-emi-stack
# Frontend linting: TypeScript, React, JSON tokens, Tailwind config.
# Covers: frontend/src/** *.config.ts *.json
# Excludes: frontend/src/generated/** (Mitosis output), **/*.lite.tsx

on:
  push:
    paths:
      - "frontend/src/**"
      - "frontend/*.json"
      - "frontend/*.config.ts"
      - "frontend/*.config.js"
      - "frontend/biome.json"
      - ".github/workflows/lint-frontend.yml"
  pull_request:
    paths:
      - "frontend/src/**"
      - "frontend/*.json"
      - "frontend/biome.json"

jobs:
  biome:
    name: Biome check (lint + format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2
        with:
          version: 2.3.0
      - name: Run Biome lint (GitHub annotations)
        run: biome lint --reporter=github .
      - name: Run Biome format check
        run: biome format .
        continue-on-error: true

  vitest:
    name: Vitest (frontend unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run Vitest
        run: npm run test -- --reporter=verbose
        continue-on-error: true
      - name: Run Vitest with coverage
        run: npm run test:cov
        continue-on-error: true
      - name: Upload coverage report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
