name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 5"
          prompt: |
            You are a senior engineer reviewing a PR for BANXE AI Bank - an FCA-authorised EMI.

            Review this PR for:
            1. **Correctness** - does the code do what the ticket says? Are edge cases handled?
            2. **Security** - hardcoded secrets, SQL injection, unsafe eval, shell injection, PII in logs
            3. **Regression** - could this break existing behaviour? Are existing tests still valid?
            4. **Test sufficiency** - are new/changed tests meaningful? Negative cases covered?
            5. **Documentation** - API.md updated? Runbooks? Compliance docs? ADR if needed?
            6. **Compliance / Audit** - is every financial action logged? Is the audit trail intact?

            Focus especially on these high-risk areas:
            - Ledger operations (services/ledger/)
            - AML / KYC decision logic (services/aml/, services/kyc/)
            - Reporting and FIN060 (services/reporting/, dbt/)
            - Auth and session management
            - Secrets handling and environment variables
            - Webhooks and external callbacks
            - Database migrations

            Classify each finding as:
            - BLOCKER: must fix before merge (security, correctness, compliance)
            - IMPORTANT: should fix before merge (significant risk if deferred)
            - NICE-TO-HAVE: optional improvement (follow-up ticket acceptable)

            Format each finding as:
            [CLASS] Short title
            File: path:line
            Problem: what is wrong
            Why it matters: business or compliance impact
            Fix direction: how to resolve

            End with: approved / approved-with-conditions / request-changes and blocker/important counts.
