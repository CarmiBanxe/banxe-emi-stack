name: BANXE EMI Quality Gate
# IL-BIOME-01 | banxe-emi-stack
#
# Full gate: runs AFTER dedicated lint workflows succeed.
# Lint details -> lint-python.yml (Ruff + Semgrep) and lint-frontend.yml (Biome + Vitest).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -- Secrets scan (P0 security gate)
  secrets-scan:
    name: Gitleaks - Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz -C /tmp
      - name: Run gitleaks
        run: |
          /tmp/gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif --redact --exit-code 0 --no-banner
          test -s gitleaks.sarif || echo '{"version":"2.1.0","runs":[]}' > gitleaks.sarif
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: warn

  # -- Python: lint
  ruff:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ruff lint (GitHub annotations)
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"
      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  # -- Frontend: Biome
  biome:
    name: Biome lint + format (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: npm install --legacy-peer-deps
      - name: Biome CI
        uses: biomejs/setup-biome@v2
        with:
          version: 2.3.0
      - name: Run Biome lint
        run: biome lint --reporter=github .
      - name: Run Biome format check
        run: biome format .
        continue-on-error: true

  # -- Python tests + coverage
  test:
    name: Pytest (coverage >= 80%)
    runs-on: ubuntu-latest
    needs: [ruff]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff semgrep mypy types-requests pyotp
      - name: mypy type check (src/)
        run: python -m mypy src/ --ignore-missing-imports --no-error-summary
      - name: Pytest with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=services --cov=api --cov=src \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "All tests passed (coverage >= 80%)" >> $GITHUB_STEP_SUMMARY
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # -- Semgrep security rules
  semgrep:
    name: Semgrep (banxe-rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep --config .semgrep/banxe-rules.yml --error

  # -- Frontend tests
  vitest:
    name: Vitest (frontend)
    runs-on: ubuntu-latest
    needs: [biome]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: npm install --legacy-peer-deps
      - name: Run Vitest
        run: npm run test
        continue-on-error: true
