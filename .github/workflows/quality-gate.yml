name: BANXE EMI Quality Gate
# IL-BIOME-01 | banxe-emi-stack
#
# Full gate: runs AFTER dedicated lint workflows succeed.
# Lint details -> lint-python.yml (Ruff + Semgrep) and lint-frontend.yml (Biome + Vitest).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -- Detect docs-only PRs (FU-1 Phase 3)
  # Lets the "Semgrep OSS" gate self-short-circuit on docs-only PRs instead of
  # hanging. All other jobs already run on every PR to main and are unaffected.
  changes:
    name: Detect docs-only PR
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect whether the PR touches code or docs only
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          base='${{ github.event.pull_request.base.sha }}'
          files="$(git diff --name-only "$base...HEAD")"
          printf 'Changed files:\n%s\n' "$files"
          if [ -z "$files" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # docs = anything under docs/ or any *.md file. Capture non-docs lines
          # (robust across grep implementations) rather than relying on `grep -qv`.
          nondocs="$(printf '%s\n' "$files" | grep -vE '^(docs/|.*\.md$)' || true)"
          if [ -n "$nondocs" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi

  # -- Secrets scan (P0 security gate)
  secrets-scan:
    name: Gitleaks - Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz -C /tmp
      - name: Run gitleaks
        run: |
          /tmp/gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif --redact --exit-code 0 --no-banner
          test -s gitleaks.sarif || echo '{"version":"2.1.0","runs":[]}' > gitleaks.sarif
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: warn

  # -- Python: lint
  ruff:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ruff lint (GitHub annotations)
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"
      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  # -- Frontend: Biome
  biome:
    name: Biome lint + format (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install frontend deps
        run: npm install --legacy-peer-deps
      - name: Biome CI
        uses: biomejs/setup-biome@v2
        with:
          version: 2.3.0
      - name: Run Biome lint
        run: biome lint --reporter=github .
      - name: Run Biome format check
        run: biome format .
        continue-on-error: true

  # -- Python tests + coverage
  test:
    name: Pytest (coverage >= 80%)
    runs-on: ubuntu-latest
    needs: [ruff]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff semgrep mypy types-requests pyotp
      - name: mypy type check (src/)
        run: python -m mypy src/ --ignore-missing-imports --no-error-summary
      - name: Pytest with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=services --cov=api --cov=src \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "All tests passed (coverage >= 80%)" >> $GITHUB_STEP_SUMMARY
      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # -- Semgrep security rules
  semgrep:
    name: Semgrep (banxe-rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep --config .semgrep/banxe-rules.yml --error

  # -- Semgrep OSS (registry default ruleset) — FU-1 Phase 3
  # In-repo owner of the required "Semgrep OSS" context (GitHub Actions / app 15368),
  # replacing the external Semgrep SaaS app (app 57789) that never reported on
  # docs-only PRs. Diff-scoped on PRs so it enforces newly changed code without
  # failing on pre-existing findings in untouched files; full-tree on push to main.
  # Requires the required-check pin for "Semgrep OSS" to move from app 57789 to
  # GitHub Actions (see .github/settings.yml and the FU-1 Phase 3 PR notes).
  semgrep-oss:
    name: Semgrep OSS
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install semgrep
        if: needs.changes.outputs.docs_only != 'true'
        run: pip install semgrep
      - name: Run Semgrep OSS (registry default ruleset)
        if: needs.changes.outputs.docs_only != 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            mapfile -t paths < <(git diff --name-only "$base...HEAD" | grep -vE '^(docs/|.*\.md$)' || true)
            if [ "${#paths[@]}" -eq 0 ]; then
              echo "No non-docs files changed; nothing for Semgrep OSS to scan."
              exit 0
            fi
            printf 'Scanning changed files:\n%s\n' "${paths[*]}"
            semgrep scan --config p/default --error "${paths[@]}"
          else
            semgrep scan --config p/default --error .
          fi
      - name: Docs-only PR — Semgrep OSS not required
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR; Semgrep OSS scan not required. Reporting success."

  # -- Frontend tests
  vitest:
    name: Vitest (frontend)
    runs-on: ubuntu-latest
    needs: [biome]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install frontend deps
        run: npm install --legacy-peer-deps
      - name: Run Vitest
        run: npm run test
        continue-on-error: true
