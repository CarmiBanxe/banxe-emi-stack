name: BANXE EMI Quality Gate
# IL-BIOME-01 | banxe-emi-stack
#
# Full gate: runs AFTER dedicated lint workflows succeed.
# Lint details → lint-python.yml (Ruff + Semgrep) and lint-frontend.yml (Biome + Vitest).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Secrets scan (P0 security gate) ─────────────────────────────────────
  secrets-scan:
    name: Gitleaks — Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Python: lint (mirrors lint-python.yml but inline for gate) ───────────
  ruff:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ruff lint (GitHub annotations)
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  # ── Frontend: Biome (mirrors lint-frontend.yml but inline for gate) ──────
  biome:
    name: Biome lint + format (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Biome CI
        uses: biomejs/setup-biome@v2
        with:
          version: 2.3.0

      - run: biome ci --reporter=github .

  # ── Python tests + coverage ───────────────────────────────────────────────
  test:
    name: Pytest (coverage ≥ 80%)
    runs-on: ubuntu-latest
    needs: [ruff]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff semgrep mypy types-requests

      - name: mypy type check (src/)
        run: python -m mypy src/ --ignore-missing-imports --no-error-summary

      - name: Pytest with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=services --cov=api --cov=src \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ All tests passed (coverage ≥ 80%)" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Semgrep security rules ────────────────────────────────────────────────
  semgrep:
    name: Semgrep (banxe-rules)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep --config .semgrep/banxe-rules.yml --error

  # ── Frontend tests ────────────────────────────────────────────────────────
  vitest:
    name: Vitest (frontend)
    runs-on: ubuntu-latest
    needs: [biome]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Run Vitest
        run: npm run test
