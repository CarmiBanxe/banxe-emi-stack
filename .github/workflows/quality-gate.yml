name: BANXE EMI Quality Gate
# IL-068 | banxe-emi-stack

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff semgrep

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=services --cov=api \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ All tests passed (coverage ≥ 80%)" >> $GITHUB_STEP_SUMMARY

      - name: Semgrep
        run: semgrep --config .semgrep/banxe-rules.yml --error

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
