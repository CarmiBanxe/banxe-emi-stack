# .pre-commit-config.yaml — Banxe EMI Stack pre-commit hooks
# IL-BIOME-01 | banxe-emi-stack
# Install: pre-commit install
# Run manually: pre-commit run --all-files
#
# Hook order:
#   1. ruff (upstream astral-sh/ruff-pre-commit) — Python lint + format
#   2. biome (local)   — Frontend TS/JSON lint + format, auto-fix
#   3. bandit          — Python security linter (OWASP Top 10)
#   4. mypy            — Static type checking (src/ strict, services/ ignored)
#   5. semgrep         — Custom fintech security rules (banxe-rules.yml)
#   6. pytest-fast     — Full test suite without coverage

repos:
  # ── Python: Ruff (upstream) ─────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        name: Ruff lint (Python)
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]

      - id: ruff-format
        name: Ruff format (Python)
        types_or: [python, pyi]

  # ── Frontend: Biome (local) ─────────────────────────────────────────────
  # Runs from frontend/ so biome.json paths (src/**) resolve correctly.
  # Covers: .ts .tsx .js .jsx .json *.config.ts
  # Excludes: src/generated/** (Mitosis output), **/*.lite.tsx (Mitosis source ok)
  # IMPORTANT: --apply-unsafe may reformat financial components — review:
  #   • EU AI Act Art.52 disclosure headers
  #   • tabular-nums / decimal-only logic
  - repo: local
    hooks:
      - id: biome-check-frontend
        name: Biome check (Frontend)
        entry: bash -c "cd /home/mmber/banxe-emi-stack/frontend && npx biome check --write ."
        language: system
        files: ^frontend/
        types_or: [ts, tsx, javascript, jsx, json]
        pass_filenames: false

  # ── Python security linter: Bandit ────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: Bandit security scan
        args: [-r, -ll, --exclude, tests/,agents/]
        types: [python]

  # ── Static type checking: mypy ────────────────────────────────────────────
  # Only checks src/ — services/ and agents/ ignored per IL-ANN-01.
  - repo: local
    hooks:
      - id: mypy-src
        name: mypy (src/ type check)
        entry: python3 -m mypy src/ --ignore-missing-imports --no-error-summary
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
        files: ^src/

  # ── Security + Tests (local) ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: semgrep-banxe
        name: Semgrep banxe rules
        entry: bash -c "cd /home/mmber/banxe-emi-stack && semgrep --config .semgrep/banxe-rules.yml --error --quiet"
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-fast
        name: Pytest (all tests, fast)
        entry: bash -c "cd /home/mmber/banxe-emi-stack && python3 -m pytest tests/ -x -q --override-ini=addopts="
        language: system
        pass_filenames: false
        always_run: true
